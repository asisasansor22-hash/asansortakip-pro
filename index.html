    /* ═══════════════════════════════════════════
       TEMEL STILLER
    ═══════════════════════════════════════════ */
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    html{height:-webkit-fill-available;}
    html,body{margin:0;padding:0;background:var(--bg-root);}

    /* ═══════════════════════════════════════════
       iOS KART & BILEŞEN STILLER
    ═══════════════════════════════════════════ */
    .ios-section{
      background:var(--bg-panel);
      border-radius:var(--radius-lg);
      overflow:hidden;
      margin-bottom:12px;
      box-shadow:var(--shadow-sm);
    }
    .ios-section-header{
      padding:12px 16px 8px;
      font-size:13px;font-weight:600;
      color:var(--text-muted);
      letter-spacing:0.3px;
      text-transform:uppercase;
    }
    .ios-row{
      padding:13px 16px;
      display:flex;align-items:center;gap:12px;
      border-top:0.5px solid var(--border-soft);
      background:var(--bg-panel);
      transition:background 0.15s;
    }
    .ios-row:first-of-type{border-top:none;}
    .ios-row:active{background:var(--bg-elevated);}

    /* ═══════════════════════════════════════════
       İOS STAT KARTLARI (BIG NUMBER)
    ═══════════════════════════════════════════ */
    .ios-stat{
      background:var(--bg-panel);
      border-radius:var(--radius-lg);
      padding:16px 14px;
      display:flex;flex-direction:column;gap:4px;
      box-shadow:var(--shadow-sm);
      position:relative;overflow:hidden;
      transition:transform 0.15s;
    }
    .ios-stat:active{transform:scale(0.97);}
    .ios-stat::before{
      content:"";
      position:absolute;top:0;left:0;right:0;
      height:3px;
      background:var(--stat-color,var(--accent));
      border-radius:var(--radius-lg) var(--radius-lg) 0 0;
    }
    .ios-stat-icon{font-size:22px;line-height:1;margin-bottom:2px;}
    .ios-stat-value{font-size:22px;font-weight:700;color:var(--stat-color,var(--text));letter-spacing:-0.5px;}
    .ios-stat-label{font-size:12px;color:var(--text-muted);font-weight:500;}

    /* ═══════════════════════════════════════════
       BUTON STİLLERİ
    ═══════════════════════════════════════════ */
    .ios-btn{
      display:inline-flex;align-items:center;justify-content:center;gap:6px;
      padding:10px 18px;border-radius:var(--radius-md);
      font-size:15px;font-weight:600;cursor:pointer;
      border:none;outline:none;
      min-height:44px;
      transition:opacity 0.15s, transform 0.1s;
      -webkit-tap-highlight-color:transparent;
    }
    .ios-btn:active{opacity:0.75;transform:scale(0.97);}
    .ios-btn-primary{background:var(--accent);color:#fff;}
    .ios-btn-destructive{background:var(--ios-red);color:#fff;}
    .ios-btn-secondary{background:var(--bg-elevated);color:var(--text);}
    .ios-btn-ghost{background:transparent;color:var(--accent);padding:8px 12px;}
    .ios-btn-sm{padding:7px 14px;font-size:13px;min-height:36px;border-radius:var(--radius-sm);}

    /* ═══════════════════════════════════════════

    .ios-modal-overlay{

    /* ═══════════════════════════════════════════
       FOTO GALERİ
    ═══════════════════════════════════════════ */
    .foto-grid{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;}
    .foto-thumb{
      width:72px;height:72px;border-radius:var(--radius-sm);
      object-fit:cover;border:0.5px solid var(--border);
      cursor:pointer;transition:transform 0.15s;
    }
    .foto-thumb:active{transform:scale(0.93);}
    .foto-add{
      width:72px;height:72px;border-radius:var(--radius-sm);
      border:1.5px dashed var(--border);
      display:flex;align-items:center;justify-content:center;
      cursor:pointer;font-size:24px;color:var(--text-dim);

    /* ═══════════════════════════════════════════

    ═══════════════════════════════════════════ */
    /* Bırakışta yaylı geri dönüş — basışta hızlı snap */
    .ios-btn{
      transition:transform 0.4s cubic-bezier(0.34,1.56,0.64,1),

    }
    .ios-btn:active{
      transform:scale(0.95);
      opacity:0.72;
      transition:transform 0.07s ease,opacity 0.07s ease;
    }

    .ios-stat{
      transition:transform 0.4s cubic-bezier(0.34,1.56,0.64,1),

    }
    .ios-stat:active{
      transform:scale(0.95);
      box-shadow:none;
      transition:transform 0.07s ease,box-shadow 0.07s ease;
    }

    .ios-row{
      transition:background 0.3s ease;
    }
    .ios-row:active{
      background:var(--bg-elevated);
      transition:background 0.05s ease;
    }

    .foto-thumb{
      transition:transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
    }
    .foto-thumb:active{
      transform:scale(0.90);
      transition:transform 0.07s ease;
    }

    /* Genel tıklanabilir butonlar (inline style olanlar dahil) */
    button{

function toXLSX(satirlar, dosyaAdi, sayfaAdi) {
  var wb = XLSX.utils.book_new();
  var ws = XLSX.utils.aoa_to_sheet(satirlar);
  // Sütun genişliklerini otomatik ayarla
  var maxCols = 0;
  satirlar.forEach(function(r){ if(r.length > maxCols) maxCols = r.length; });
  var colWidths = [];
  for(var ci = 0; ci < maxCols; ci++){
    var max = 8;
    satirlar.forEach(function(r){
      var val = r[ci];
      if(val !== undefined && val !== null){
        var len = String(val).length;
        if(len > max) max = len;
      }
    });
    colWidths.push({ wch: Math.min(max + 3, 45) });
  }
  ws['!cols'] = colWidths;
  XLSX.utils.book_append_sheet(wb, ws, sayfaAdi || "Rapor");
  XLSX.writeFile(wb, dosyaAdi + ".xlsx");
}

// localStorage yedek yardımcıları
function lsGet(key){try{var d=localStorage.getItem(key);return d?JSON.parse(d):null;}catch(e){return null;}}
function lsSet(key,val){try{localStorage.setItem(key,JSON.stringify(val));}catch(e){}}

async function dbGet(key) {
  try {
    var controller = new AbortController();
    var timer = setTimeout(function(){ controller.abort(); }, 8000);
    var res = await fetch(FIREBASE_DB_URL + "/asansor/" + key + ".json", {
      signal: controller.signal
    });
    clearTimeout(timer);
    if(!res.ok) return null;
    var data = await res.json();
    return (data !== null && data !== undefined) ? data : null;
  } catch(e) { return null; }
}

async function dbSet(key, value) {
  try {
    await fetch(FIREBASE_DB_URL + "/asansor/" + key + ".json", {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(value)
    });
  } catch(e) {}
}

  );
}



// ═══════════════════════════════════════════════════════════
//  YÖNETİCİ BAKIM ATAMA PANELİ
// ═══════════════════════════════════════════════════════════
function BakimAtamaPaneli({elevs,maints,setMaints,faults,setFaults,fMonth,setFMonth,ilceler,elevByIlce,today,eName}){
  const [seciliIlce,setSeciliIlce]=useState(null);   // hangi ilçe açık
  const [secili,setSecili]=useState({});              // {elevId: true}
  const [gorunum,setGorunum]=useState("bekleyen");   // "bekleyen"|"atandi"|"tamam"
  const [expandKl,setExpandKl]=useState(null);

  const mMonth=useMemo(()=>maints.filter(m=>{
    const d=new Date(m.tarih);
    return d.getMonth()===fMonth&&d.getFullYear()===new Date().getFullYear();
  }),[maints,fMonth]);

  const durumEl=(elev)=>{
    // Aynı asansöre ait tüm kayıtları al
    const kayitlar=mMonth.filter(m=>m.asansorId===elev.id);
    if(kayitlar.length===0) return "bekleyen";
    // Öncelik: tamamlanan > atanmış > bekleyen
    if(kayitlar.some(m=>m.yapildi)) return "tamam";
    if(kayitlar.some(m=>m.planlanmis)) return "atandi";
    return "bekleyen";
  };

  const bekleyenler=useMemo(()=>elevs.filter(e=>durumEl(e)==="bekleyen"),[elevs,mMonth]);
  const atananlar=useMemo(()=>elevs.filter(e=>durumEl(e)==="atandi"),[elevs,mMonth]);
  const tamamlananlar=useMemo(()=>elevs.filter(e=>durumEl(e)==="tamam"),[elevs,mMonth]);

  // Seçili ilçedeki asansörleri tarih→semt sıralı grupla
  const grupluIlce=useMemo(()=>{
    if(!seciliIlce) return {};
    const listSrc=gorunum==="bekleyen"?bekleyenler:gorunum==="atandi"?atananlar:tamamlananlar;
    const eles=listSrc.filter(e=>e.ilce===seciliIlce);
    // gun → semt → [elev]
    const byGun={};
    eles.forEach(e=>{
      const g=parseInt(e.bakimGunu)||0;
      if(!byGun[g]) byGun[g]={};
      const s=e.semt||"Diğer";
      if(!byGun[g][s]) byGun[g][s]=[];
      byGun[g][s].push(e);
    });
    return byGun;
  },[seciliIlce,gorunum,bekleyenler,atananlar,tamamlananlar]);

  const ilceBekleyen=(ilce)=>(elevByIlce[ilce]||[]).filter(e=>durumEl(e)==="bekleyen").length;
  const ilceAtanan=(ilce)=>(elevByIlce[ilce]||[]).filter(e=>durumEl(e)==="atandi").length;
  const ilceTamam=(ilce)=>(elevByIlce[ilce]||[]).filter(e=>durumEl(e)==="tamam").length;

  const ataEl=(elevId)=>{
    const elev=elevs.find(e=>e.id===elevId);
    // Bu aya ait TÜM kayıtları bul (duplikat olabilir)
    const ayKayitlari=mMonth.filter(m=>m.asansorId===elevId);
    if(ayKayitlari.length>0){
      // Mevcut kayıtların hepsini planlanmis:true yap (duplikat güvenliği)
      const ilkId=ayKayitlari[0].id;
      setMaints(p=>p.map(x=>{
        if(ayKayitlari.some(k=>k.id===x.id)){
          // İlk kayıt dışındakileri (duplikatları) sil: planlanmis:false, yapildi:false ile "pasif" yap
          // İlk kaydı aktif tut
          return x.id===ilkId?{...x,planlanmis:true}:{...x,planlanmis:false,yapildi:false};
        }
        return x;
      }));
    } else {
      setMaints(p=>[...p,{
        id:Date.now()+Math.random(),
        asansorId:elevId,
        tarih:today,
        tutar:elev.aylikUcret,
        kdv:elev.kdv,
        yapildi:false,odendi:false,
        planlanmis:true,notlar:"",
        alinanTutar:0,kl:{}
      }]);
    }
  };

  const geriAl=(elevId)=>{
    // Bu aya ait TÜM kayıtları iptal et (duplikat güvenliği)
    const ayKayitlari=mMonth.filter(m=>m.asansorId===elevId);
    if(ayKayitlari.length>0){
      setMaints(p=>p.map(x=>ayKayitlari.some(k=>k.id===x.id)?{...x,planlanmis:false}:x));
    }
  };

  const bakimYapilmadi=(elevId)=>{
    const m=mMonth.find(m=>m.asansorId===elevId);
    if(m) setMaints(p=>p.map(x=>x.id===m.id?{...x,yapildi:false,yapildiSaat:null,planlanmis:true}:x));
  };

  const ataSecililer=()=>{
    Object.keys(secili).filter(id=>secili[id]).forEach(id=>ataEl(parseInt(id)));
    setSecili({});
  };

  const togSec=(id)=>setSecili(p=>({...p,[id]:!p[id]}));
  const seciliSayi=Object.values(secili).filter(Boolean).length;

  // ilçedeki tüm görünen asansörleri seç/kaldır
  const togIlceTum=()=>{
    const tum=[];
    Object.values(grupluIlce).forEach(semtler=>
      Object.values(semtler).forEach(eles=>eles.forEach(e=>tum.push(e.id)))
    );
    const hepsiSecili=tum.every(id=>secili[id]);
    const yeni={...secili};
    tum.forEach(id=>yeni[id]=!hepsiSecili);
    setSecili(yeni);
  };

  const togSemtTum=(eles)=>{
    const hepsi=eles.every(e=>secili[e.id]);
    const yeni={...secili};
    eles.forEach(e=>{yeni[e.id]=!hepsi;});
    setSecili(yeni);
  };

  const GORUNUM_TABS=[
    {k:"bekleyen",l:"⏳ Bekleyen",c:"#f59e0b",count:bekleyenler.length},
    {k:"atandi",l:"🔧 Bakımcıda",c:"#8b5cf6",count:atananlar.length},
    {k:"tamam",l:"✅ Tamamlandı",c:"#10b981",count:tamamlananlar.length},
  ];

  const listSrcIlce=gorunum==="bekleyen"?bekleyenler:gorunum==="atandi"?atananlar:tamamlananlar;

  return(
    React.createElement('div', null
      /* Başlık */
      , React.createElement('div', { style: {display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:10},}
        , React.createElement('h2', { style: {fontSize:18,fontWeight:900,margin:0},}, "🔧 Bakım Atama Paneli"   )
        , React.createElement('select', { value: fMonth, onChange: e=>setFMonth(+e.target.value), style: S.sel,}
          , MONTHS.map((m,i)=>React.createElement('option', { key: i, value: i,}, m))
        )
      )

      /* Özet sekmeler */
      , React.createElement('div', { style: {display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:14},}
        , GORUNUM_TABS.map(t=>(
          React.createElement('button', { key: t.k, onClick: ()=>{setGorunum(t.k);setSeciliIlce(null);setSecili({});},
            style: {padding:"11px 8px",borderRadius:12,background:gorunum===t.k?t.c+"22":"#1a1f2e",border:"2px solid "+(gorunum===t.k?t.c+"66":"#2a3050"),cursor:"pointer",textAlign:"center"},}
            , React.createElement('div', { style: {fontSize:22,fontWeight:900,color:t.c},}, t.count)
            , React.createElement('div', { style: {fontSize:11,color:gorunum===t.k?t.c:"#64748b",fontWeight:gorunum===t.k?700:400},}, t.l)
          )
        ))
      )

      /* İlçe grid */
      , React.createElement('div', { style: {marginBottom:seciliIlce?0:0},}
        , React.createElement('div', { style: {fontSize:11,fontWeight:700,color:"#94a3b8",marginBottom:8,display:"flex",justifyContent:"space-between",alignItems:"center"},}
          , React.createElement('span', null, "İlçe Seçin" )
          , seciliIlce&&React.createElement('button', { onClick: ()=>{setSeciliIlce(null);setSecili({});}, style: {background:"none",border:"none",color:"#64748b",cursor:"pointer",fontSize:11,fontWeight:600},}, "✕ Kapat" )
        )
        , React.createElement('div', { style: {display:"flex",flexWrap:"wrap",gap:6,marginBottom:14},}
          , ilceler.map(ilce=>{
            const c=getIlceRenk(ilce);
            const bek=ilceBekleyen(ilce);
            const ata=ilceAtanan(ilce);
            const tam=ilceTamam(ilce);
            const aktifSayi=gorunum==="bekleyen"?bek:gorunum==="atandi"?ata:tam;
            if(aktifSayi===0) return null;
            const acik=seciliIlce===ilce;
            return(
              React.createElement('button', { key: ilce, onClick: ()=>{setSeciliIlce(acik?null:ilce);setSecili({});},
                style: {
                  display:"flex",alignItems:"center",gap:6,
                  padding:"7px 12px",borderRadius:20,
                  background:acik?c+"33":"#1a1f2e",
                  border:"2px solid "+(acik?c:c+"44"),
                  color:acik?"#fff":c,
                  fontSize:12,fontWeight:700,cursor:"pointer",
                  transition:"all .15s",
                  boxShadow:acik?"0 0 0 3px "+c+"22":"none"
                },}
                , React.createElement('span', null, ilce)
                , React.createElement('span', { style: {
                  background:acik?c:c+"33",
                  color:acik?"#000":c,
                  borderRadius:20,fontSize:10,
                  padding:"1px 7px",fontWeight:900
                },}, aktifSayi)
              )
            );
          })
        )
      )

      /* Seçili ilçe panel */
      , seciliIlce&&(
        React.createElement('div', { style: {background:"#141824",borderRadius:14,border:"2px solid "+getIlceRenk(seciliIlce)+"44",overflow:"hidden",marginBottom:14},}
          /* Panel başlık */
          , React.createElement('div', { style: {
            padding:"12px 16px",
            background:"linear-gradient(135deg,"+getIlceRenk(seciliIlce)+"22,#141824)",
            borderBottom:"1px solid "+getIlceRenk(seciliIlce)+"33",
            display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"
          },}
            , React.createElement('div', { style: {width:4,height:24,borderRadius:2,background:getIlceRenk(seciliIlce),flexShrink:0},})
            , React.createElement('div', { style: {flex:1},}
              , React.createElement('div', { style: {fontWeight:900,fontSize:15,color:getIlceRenk(seciliIlce)},}, seciliIlce)
              , React.createElement('div', { style: {fontSize:11,color:"#64748b"},}, MONTHS[fMonth], " · "  , listSrcIlce.filter(e=>e.ilce===seciliIlce).length, " bina" )
            )

            /* Toplu seçim butonları */
            , React.createElement('div', { style: {display:"flex",gap:6,flexWrap:"wrap"},}
              , React.createElement('button', { onClick: togIlceTum,
                style: {padding:"5px 12px",borderRadius:8,background:"#1e2640",border:"1px solid #3b82f644",color:"#3b82f6",fontSize:11,fontWeight:700,cursor:"pointer"},}
                , Object.keys(grupluIlce).length>0&&Object.values(grupluIlce).every(s=>Object.values(s).every(eles=>eles.every(e=>secili[e.id])))
                  ?"☑ Tümünü Kaldır":"☐ Tümünü Seç"
              )
              , seciliSayi>0&&gorunum==="bekleyen"&&(
                React.createElement('button', { onClick: ataSecililer,
                  style: {padding:"5px 14px",borderRadius:8,background:"linear-gradient(135deg,#f59e0b,#d97706)",border:"none",color:"#000",fontWeight:800,fontSize:11,cursor:"pointer"},}, "📤 "
                   , seciliSayi, " Binayı Bakımcıya At"
                )
              )
              , seciliSayi>0&&gorunum==="atandi"&&(
                React.createElement('button', { onClick: ()=>{Object.keys(secili).filter(id=>secili[id]).forEach(id=>geriAl(parseInt(id)));setSecili({});},
                  style: {padding:"5px 14px",borderRadius:8,background:"#1a1f2e",border:"1px solid #ef444444",color:"#ef4444",fontWeight:700,fontSize:11,cursor:"pointer"},}, "↩ "
                   , seciliSayi, " Binayı Geri Al"
                )
              )
            )
          )

          /* Tarih grupları */
          , React.createElement('div', { style: {padding:"10px 14px"},}
            , Object.keys(grupluIlce).length===0&&(
              React.createElement('div', { style: {textAlign:"center",padding:"24px",color:"#475569",fontSize:13},}, "— Bu kategoride bina yok —"     )
            )
            , Object.entries(grupluIlce).sort((a,b)=>+a[0]-+b[0]).map(([gun,semtler])=>(
              React.createElement('div', { key: gun, style: {marginBottom:14},}
                /* Tarih başlığı */
                , React.createElement('div', { style: {
                  display:"flex",alignItems:"center",gap:8,
                  marginBottom:8,padding:"6px 10px",
                  background:"#0d1321",borderRadius:8,
                  borderLeft:"3px solid "+getIlceRenk(seciliIlce)
                },}
                  , React.createElement('span', { style: {fontSize:14,fontWeight:900,color:getIlceRenk(seciliIlce)},}
                    , gun==="0"?"Gün Belirtilmemiş":"Ayın "+gun+"'i"
                  )
                  , React.createElement('span', { style: {fontSize:10,color:"#64748b"},}, "· "
                     , Object.values(semtler).reduce((s,a)=>s+a.length,0), " bina · "
                     , Object.keys(semtler).length, " semt"
                  )
                )

                /* Semt grupları */
                , Object.entries(semtler).map(([semt,eles])=>{
                  const hepsiSec=eles.every(e=>secili[e.id]);
                  return(
                    React.createElement('div', { key: semt, style: {marginBottom:8},}
                      /* Semt başlığı */
                      , React.createElement('div', { style: {display:"flex",alignItems:"center",gap:7,marginBottom:4,padding:"4px 8px"},}
                        , React.createElement('div', { onClick: ()=>togSemtTum(eles),
                          style: {
                            width:16,height:16,borderRadius:4,
                            background:hepsiSec?"#3b82f6":"transparent",
                            border:"2px solid "+(hepsiSec?"#3b82f6":"#475569"),
                            display:"flex",alignItems:"center",justifyContent:"center",
                            cursor:"pointer",flexShrink:0,fontSize:9,color:"#fff",fontWeight:900
                          },}, hepsiSec?"✓":"")
                        , React.createElement('span', { style: {fontSize:11,fontWeight:700,color:"#94a3b8"},}, "📍 " , semt)
                        , React.createElement('span', { style: {fontSize:10,color:"#475569"},}, "(", eles.length, " bina)" )
                        , gorunum==="bekleyen"&&(
                          React.createElement('button', { onClick: ()=>togSemtTum(eles),
                            style: {marginLeft:"auto",fontSize:10,padding:"2px 8px",borderRadius:5,background:"#1e2640",border:"1px solid #3b82f644",color:"#3b82f6",cursor:"pointer",fontWeight:600},}
                            , hepsiSec?"Kaldır":"Hepsini Seç"
                          )
                        )
                      )

                      /* Binalar */
                      , React.createElement('div', { style: {display:"flex",flexDirection:"column",gap:3,paddingLeft:8},}
                        , eles.map(e=>{
                          const m=mMonth.find(m=>m.asansorId===e.id);
                          const isSec=!!secili[e.id];
                          return(
                            React.createElement('div', { key: e.id, style: {
                              display:"flex",alignItems:"center",gap:8,
                              padding:"9px 11px",borderRadius:9,
                              background:isSec?"#1e2a4a":"#0d1321",
                              border:"1px solid "+(isSec?"#3b82f6":_optionalChain([m, 'optionalAccess', _ => _.yapildi])?"#1e3a2e":_optionalChain([m, 'optionalAccess', _2 => _2.planlanmis])?"#2a1e40":"#1e2640"),
                              cursor:gorunum!=="tamam"?"pointer":"default",
                              transition:"all .1s"
                            },
                            onClick: gorunum!=="tamam"?()=>togSec(e.id):undefined,}

                              /* Checkbox */
                              , gorunum!=="tamam"&&(
                                React.createElement('div', { style: {
                                  width:16,height:16,borderRadius:4,
                                  background:isSec?"#3b82f6":"transparent",
                                  border:"2px solid "+(isSec?"#3b82f6":"#475569"),
                                  display:"flex",alignItems:"center",justifyContent:"center",
                                  flexShrink:0,fontSize:9,color:"#fff",fontWeight:900
                                },}, isSec?"✓":"")

                                  )
                                )
                              )

                              /* Sağ bilgi */
                              , React.createElement('div', { style: {display:"flex",gap:5,alignItems:"center",flexShrink:0}, onClick: ev=>ev.stopPropagation(),}
                                , React.createElement('span', { style: {fontSize:11,fontWeight:700,color:"#10b981"},}, e.aylikUcret.toLocaleString("tr-TR"), " ₺")
                                , gorunum==="atandi"&&(
                                  React.createElement('button', { onClick: ()=>geriAl(e.id),
                                    style: {padding:"3px 8px",borderRadius:6,background:"#1a1f2e",border:"1px solid #ef444433",color:"#ef4444",fontSize:10,cursor:"pointer",fontWeight:600},}, "↩ Geri Al"

                                  )
                                )
                                , gorunum==="tamam"&&(
                                  React.createElement('div', { style: {display:"flex",flexDirection:"column",gap:3,alignItems:"flex-end"},}
                                    , React.createElement('span', { style: {fontSize:10,background:(e.bakiyeDevir||0)>0?"#3a1e1e":"#1e3a2e",color:(e.bakiyeDevir||0)>0?"#ef4444":"#10b981",padding:"3px 8px",borderRadius:6,fontWeight:700}}, "Devir: "+((e.bakiyeDevir||0)).toLocaleString("tr-TR")+" ₺")
                                    , (function(){
                                        /* Yeni devir hesabı */
                                        var bk=mMonth.find(function(bx){return bx.asansorId===e.id&&bx.yapildi;});
                                        if(!bk) return null;
                                        var eskiD=e.bakiyeDevir||0;
                                        var ayUcret=e.aylikUcret||0;
                                        var alinan=bk.odendi?(bk.alinanTutar||bk.tutar||0):0;
                                        var nd=eskiD+ayUcret-alinan;
                                        var ndColor=nd>0?"#f97316":nd===0?"#94a3b8":"#34d399";
                                        var ndBg=nd>0?"#4a2000":nd===0?"#1a1f2e":"#0a2a1a";
                                        return React.createElement('span', {style:{fontSize:9,background:ndBg,color:ndColor,padding:"3px 8px",borderRadius:6,fontWeight:800,border:"1px solid "+ndColor+"44"}},
                                          "Yeni: "+(nd>0?"+":"")+nd.toLocaleString("tr-TR")+" ₺"
                                        );
                                      })()
                                    , React.createElement('button', { onClick: (ev)=>{ev.stopPropagation();bakimYapilmadi(e.id);},
                                        style: {padding:"3px 7px",borderRadius:5,background:"#3a1e1e",border:"1px solid #ef444455",color:"#ef4444",fontSize:10,cursor:"pointer",fontWeight:700,whiteSpace:"nowrap",lineHeight:"1.4"}
                                      }, "✗ Yapılmadı")
                                  )
                                )
                                , gorunum==="bekleyen"&&(
                                  React.createElement('button', { onClick: (ev)=>{ev.stopPropagation();ataEl(e.id);},
                                    style: {padding:"3px 10px",borderRadius:6,background:"#1e3a10",border:"1px solid #f59e0b44",color:"#f59e0b",fontSize:10,cursor:"pointer",fontWeight:700},}, "📤 Ata"

                                  )
                                )
                              )
                            )
                          );
                        })
                      )
                    )
                  );
                })
              )
            ))
          )
        )
      )

      /* İlçe seçilmemişse genel özet */
      , !seciliIlce&&(
        React.createElement('div', { style: {background:"#141824",borderRadius:12,border:"1px solid #2a3050",padding:"16px"},}
          , React.createElement('div', { style: {fontSize:12,color:"#64748b",marginBottom:10,fontWeight:600},}
            , gorunum==="bekleyen"?"Atanmayı bekleyen binaları görmek için ilçeye tıklayın:"
             :gorunum==="atandi"?"Bakımcıya atanan binaları görmek için ilçeye tıklayın:"
             :"Tamamlanan bakımları görmek için ilçeye tıklayın:"
          )

            , ilceler.map(ilce=>{
              const c=getIlceRenk(ilce);
              const bek=ilceBekleyen(ilce);

              const toplam=(elevByIlce[ilce]||[]).length;
              const pct=toplam>0?Math.round(tam/toplam*100):0;
              return(
                React.createElement('div', { key: ilce, style: {background:"#0d1321",borderRadius:9,padding:"10px 12px",border:"1px solid #1e2640",borderLeft:"3px solid "+c},}
                  , React.createElement('div', { style: {fontWeight:700,fontSize:12,color:c,marginBottom:5},}, ilce)
                  , React.createElement('div', { style: {display:"flex",gap:8,fontSize:10},}
                    , React.createElement('span', { style: {color:"#f59e0b"},}, "⏳ " , bek)
                    , React.createElement('span', { style: {color:"#8b5cf6"},}, "🔧 " , ata)
                    , React.createElement('span', { style: {color:"#10b981"},}, "✅ " , tam)
                  )

                    , React.createElement('div', { style: {height:"100%",background:pct===100?"#10b981":c,borderRadius:10,width:pct+"%"},})
                  )
                )
              );
            })
          )
        )
      )
    )
  );
}


// ═══════════════════════════════════════════════════════════
//  BAKIM MAKBUZ - Termal makbuz yazdırma (58mm)
// ═══════════════════════════════════════════════════════════
function makbuzBakimYazdir(maint, elev, seqNo) {
  // Bakımın kendi tarih/saatini kullan — bastırma zamanını değil
  var yapildiStr = maint.yapildiSaat ? String(maint.yapildiSaat) : "";
  var datePart = yapildiStr.split(" ")[0] || ""; // "YYYY-MM-DD"
  var timePart = yapildiStr.split(" ")[1] || ""; // "HH:MM"
  var dateObj = datePart ? new Date(datePart + "T00:00:00") : new Date();
  var gun = dateObj.getDate().toString().padStart(2,"0");
  var ay = (dateObj.getMonth()+1).toString().padStart(2,"0");
  var yil = dateObj.getFullYear();
  var saat = timePart ? timePart.substring(0,5) : "";
  var tarihStr = gun+"."+ay+"."+yil;
  var makbuzNo = gun+ay+String(yil)+"-"+(seqNo||1);

function BakimciGorunum({elevs,maints,setMaints,faults,setFaults,bal,ilceler,today,fMonth,setFMonth,eName,sonOdemeler,setSonOdemeler}){
  const [subTab,setSubTab]=useState(0);
  const [bakimSubTab,setBakimSubTab]=useState(0); // 0=Bekleyen, 1=Tamamlanan
  const [odemeModal,setOdemeModal]=useState(null);
  const [odemeForm,setOdemeForm]=useState({alinan:"",not:""});
  const [seciliGun,setSeciliGun]=useState(0); // 0=bugün, 1=dün ... 5
  const [odemeSorModal,setOdemeSorModal]=useState(null); // {m, elev} - bakım sonrası ödeme sor
  const [odemeMiktar,setOdemeMiktar]=useState("");
  const [makbuzSonBakim,setMakbuzSonBakim]=useState(null); // {m, elev} - ödeme sonrası makbuz

  // Son 6 günü üret
  const sonGunler=useMemo(()=>{
    return [0,1,2,3,4,5].map(function(offset){
      var d=new Date(); d.setDate(d.getDate()-offset);
      var yyyy=d.getFullYear();
      var mm=(d.getMonth()+1).toString().padStart(2,"0");
      var dd=d.getDate().toString().padStart(2,"0");
      var tarihStr=yyyy+"-"+mm+"-"+dd;
      var label=offset===0?"Bugün":offset===1?"Dün":(offset+" gün önce");
      return {offset,label,tarihStr};
    });
  },[]);

  // yapildiSaat alanından tarih kısmını çıkar (ISO: "yyyy-mm-dd hh:mm" veya TR: "dd.mm.yyyy hh:mm:ss")
  const parseTarihStr=function(saat){
    if(!saat) return null;
    var s=String(saat).trim();
    // ISO format: 2025-01-15 14:30
    if(/^\d{4}-\d{2}-\d{2}/.test(s)) return s.substring(0,10);
    // TR format: 15.01.2025 14:30:00
    var p=s.split(" ")[0].split(".");
    if(p.length===3&&p[2].length===4) return p[2]+"-"+p[1].padStart(2,"0")+"-"+p[0].padStart(2,"0");
    return null;
  };

  const mMonth=useMemo(()=>maints.filter(m=>{const d=new Date(m.tarih);return d.getMonth()===fMonth&&d.getFullYear()===new Date().getFullYear();}),[maints,fMonth]);
  const atananBakimlar=useMemo(()=>mMonth.filter(m=>m.planlanmis&&elevs.some(e=>e.id===m.asansorId)),[mMonth,elevs]);
  const bekleyenBakimlar=useMemo(()=>atananBakimlar.filter(m=>!m.yapildi),[atananBakimlar]);
  // Tüm tamamlananlar (saat sırasıyla)
  const tamamlananBakimlarTum=useMemo(()=>atananBakimlar.filter(m=>m.yapildi).slice().sort(function(a,b){
    return String(a.yapildiSaat||"").localeCompare(String(b.yapildiSaat||""));
  }),[atananBakimlar]);
  // Seçili güne göre filtreli
  const seciliTarihStr=sonGunler[seciliGun]?sonGunler[seciliGun].tarihStr:null;
  const tamamlananBakimlar=useMemo(()=>{
    if(!seciliTarihStr) return tamamlananBakimlarTum;
    return tamamlananBakimlarTum.filter(function(m){
      return parseTarihStr(m.yapildiSaat)===seciliTarihStr;
    });
  },[tamamlananBakimlarTum,seciliTarihStr]);

  const atananArizalar=useMemo(()=>faults.filter(f=>f.bakimciAtandi),[faults]);

  const kaydetOdeme=()=>{
    const {elev,maint}=odemeModal;
    const alinan=parseFloat(odemeForm.alinan)||0;
    const simdi=new Date().toLocaleString("tr-TR");
    if(maint){
      setMaints(p=>p.map(m=>m.id===maint.id?{...m,alinanTutar:alinan,notlar:odemeForm.not||m.notlar,yapildi:true,yapildiSaat:simdi,odendi:alinan>=m.tutar}:m));
    } else {
      setMaints(p=>[...p,{id:Date.now(),asansorId:elev.id,tarih:today,yapildiSaat:simdi,tutar:elev.aylikUcret,alinanTutar:alinan,kdv:elev.kdv,yapildi:true,odendi:alinan>=elev.aylikUcret,planlanmis:true,notlar:odemeForm.not||"",kl:{}}]);
    }
    setOdemeModal(null);setOdemeForm({alinan:"",not:""});
  };

  // Bakımı tamamla: ISO tarih/saat kaydet, sonra ödeme sor
  const tamamlaBakim=(m,elev)=>{
    var now=new Date();
    var yyyy=now.getFullYear();
    var mm=(now.getMonth()+1).toString().padStart(2,"0");
    var dd=now.getDate().toString().padStart(2,"0");
    var hh=now.getHours().toString().padStart(2,"0");
    var mi=now.getMinutes().toString().padStart(2,"0");
    var simdi=yyyy+"-"+mm+"-"+dd+" "+hh+":"+mi;
    setMaints(p=>p.map(x=>x.id===m.id?{...x,yapildi:true,yapildiSaat:simdi}:x));
    // Ödeme alındı mı diye sor
    setOdemeSorModal({m:m,elev:elev,yapildiSaat:simdi});
    setOdemeMiktar("");
  };

  // Ödeme kaydını onayla
  const odemeSorKaydet=()=>{
    if(!odemeSorModal) return;
    var tutar=parseFloat(odemeMiktar)||0;
    if(tutar<=0) return;
    var m=odemeSorModal.m;
    var elev=odemeSorModal.elev;
    var yapildiSaat=odemeSorModal.yapildiSaat;
    // Bakım kaydına ödeme bilgisi ekle
    setMaints(function(p){return p.map(function(x){return x.id===m.id?Object.assign({},x,{alinanTutar:tutar,odendi:true}):x;});});
    // Son ödemeler listesine ekle
    var parts=yapildiSaat.split(" ");
    var tarih=parts[0]||"";
    var saat=parts[1]||"";
    setSonOdemeler(function(p){return p.concat([{id:Date.now(),aid:elev.id,tarih:tarih,saat:saat,alinanTutar:tutar,not:"Bakım sonrası tahsilat",binaAd:elev.ad||"?",ilce:elev.ilce||"",yonetici:elev.yonetici||""}]);});
    // NOT: bakiyeDevir burada değiştirilmez — ay kapanışında yeniDevir → bakiyeDevir geçer
    setOdemeSorModal(null);
    setOdemeMiktar("");
  };

  const toplamYapilan=tamamlananBakimlarTum.length;
  const acikAriza=atananArizalar.filter(f=>f.durum!=="Çözüldü").length;

  const TABS2=[
    {l:"🔧 Bakımlar",c:"#f59e0b",count:bekleyenBakimlar.length},
    {l:"⚠️ Arızalar",c:"#ef4444",count:atananArizalar.filter(f=>f.durum!=="Çözüldü").length},
  ];

  return(
    React.createElement('div', null
      /* Özet */
      , React.createElement('div', { style: {display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:14},}
        , React.createElement('div', { style: {background:"#1a1f2e",borderRadius:10,padding:"10px 12px",border:"1px solid #f59e0b33",textAlign:"center"},}
          , React.createElement('div', { style: {fontSize:18,fontWeight:900,color:"#f59e0b"},}, atananBakimlar.length)
          , React.createElement('div', { style: {fontSize:10,color:"#64748b"},}, "Atanan")
        )
        , React.createElement('div', { style: {background:"#1a1f2e",borderRadius:10,padding:"10px 12px",border:"1px solid #10b98133",textAlign:"center"},}
          , React.createElement('div', { style: {fontSize:18,fontWeight:900,color:"#10b981"},}, toplamYapilan)
          , React.createElement('div', { style: {fontSize:10,color:"#64748b"},}, "Tamamlanan")
        )
        , React.createElement('div', { style: {background:"#1a1f2e",borderRadius:10,padding:"10px 12px",border:"1px solid #ef444433",textAlign:"center"},}
          , React.createElement('div', { style: {fontSize:18,fontWeight:900,color:"#ef4444"},}, acikAriza)
          , React.createElement('div', { style: {fontSize:10,color:"#64748b"},}, "Açık Arıza" )
        )
      )

      /* Sekmeler */
      , React.createElement('div', { style: {display:"flex",gap:6,marginBottom:14},}
        , TABS2.map((t,i)=>(
          React.createElement('button', { key: i, onClick: ()=>setSubTab(i),
            style: {flex:1,padding:"10px 8px",borderRadius:10,background:subTab===i?t.c+"22":"#1a1f2e",border:"2px solid "+(subTab===i?t.c+"66":"#2a3050"),color:subTab===i?t.c:"#64748b",fontWeight:subTab===i?800:400,fontSize:13,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:6},}
            , t.l
            , t.count>0&&React.createElement('span', { style: {background:subTab===i?t.c:"#2a3050",color:subTab===i?"#000":"#64748b",borderRadius:20,fontSize:10,padding:"1px 6px",fontWeight:900},}, t.count)
          )
        ))
      )

      /* Ay filtresi (sadece bekleyen) */
      , subTab===0&&bakimSubTab===0&&(
        React.createElement('div', { style: {marginBottom:12},}
          , React.createElement('select', { value: fMonth, onChange: e=>setFMonth(+e.target.value), style: S.sel,}
            , MONTHS.map((m,i)=>React.createElement('option', { key: i, value: i,}, m))
          )
        )
      )

      /* Gün filtresi (tamamlanan) */
      , subTab===0&&bakimSubTab===1&&(
        React.createElement('div', { style: {marginBottom:12,display:"flex",gap:5,flexWrap:"wrap"},}
          , sonGunler.map(function(g){
            var count=tamamlananBakimlarTum.filter(function(m){return parseTarihStr(m.yapildiSaat)===g.tarihStr;}).length;
            return React.createElement('button', {

  satirlar.push([]);
  satirlar.push(["TOPLAM","","","","","","",toplamUcret,toplamDevir]);
  toXLSX(satirlar, tarihStr+" "+saatStr+" ASİS AYLIK BAKIM", "Asansörler");
}

function exportExcel(odemeler, dosyaAdi){
  if(!odemeler||odemeler.length===0){alert("Dışa aktarılacak veri yok!");return;}
  var baslik=["Tarih","Saat","Bina","İlçe","Yönetici","Alınan (₺)","Not"];
  var satirlar=[baslik].concat(odemeler.map(function(o){
    return [o.tarih||"",o.saat||"",o.binaAd||o.ad||"",o.ilce||"",o.yonetici||"",(o.alinanTutar||0),o.not||""];
  }));
  // Toplam satırı ekle
  var toplamTutar=odemeler.reduce(function(s,o){return s+(o.alinanTutar||0);},0);
  satirlar.push(["","","","","","",""]); // boş satır
  satirlar.push(["TOPLAM","","","","",toplamTutar,odemeler.length+" ödeme"]);
  
  toXLSX(satirlar, dosyaAdi||"odeme_raporu", "Ödemeler");
}

// ═══════════════════════════════════════════════════════════
//  NOTLAR EKRANI
// ═══════════════════════════════════════════════════════════
function NotlarEkrani({elevs,notlar,setNotlar,rol,ilceler}){
  var [yeniIlce,setYeniIlce]=useState("");
  var [yeniBina,setYeniBina]=useState("");
  var [yeniNot,setYeniNot]=useState("");
  var [filtreBina,setFiltreBina]=useState("tumu"); // "tumu" | asansorId string
  var [duzenlemeId,setDuzenlemeId]=useState(null);
  var [duzenlemeMetin,setDuzenlemeMetin]=useState("");

  var yeniBinaListesi=elevs.filter(function(e){return (e.ilce||"Diğer")===yeniIlce;});
  var seciliBinaObj=elevs.find(function(e){return String(e.id)===String(yeniBina);});

  var tumNotlar=notlar.slice().sort(function(a,b){return String(b.tarihSaat).localeCompare(String(a.tarihSaat));});
  var gorunenNotlar=filtreBina==="tumu"?tumNotlar:tumNotlar.filter(function(n){return String(n.asansorId)===String(filtreBina);});

  // Binalar: not olan binalar (filtre için)
  var notluBinaIds=[...new Set(notlar.map(function(n){return n.asansorId;}))];
  var notluBinalar=elevs.filter(function(e){return notluBinaIds.includes(e.id);});

  function simdiStr(){
    var now=new Date();
    return now.getFullYear()+"-"+(now.getMonth()+1).toString().padStart(2,"0")+"-"+now.getDate().toString().padStart(2,"0")
      +" "+now.getHours().toString().padStart(2,"0")+":"+now.getMinutes().toString().padStart(2,"0");
  }

  function notEkle(){
    if(!yeniNot.trim()||!yeniBina) return;
    var yeni={id:Date.now(),asansorId:Number(yeniBina),metin:yeniNot.trim(),tarihSaat:simdiStr(),rol:rol};
    setNotlar(function(p){return p.concat([yeni]);});
    setYeniNot("");
    setYeniIlce("");
    setYeniBina("");
  }

  function notSil(id){
    if(!window.confirm("Bu not silinsin mi?")) return;
    setNotlar(function(p){return p.filter(function(n){return n.id!==id;});});
  }

  function duzenlemeBaslat(n){setDuzenlemeId(n.id);setDuzenlemeMetin(n.metin);}

  function duzenlemeSaydet(){
    if(!duzenlemeMetin.trim()) return;
    setNotlar(function(p){return p.map(function(n){
      return n.id===duzenlemeId?Object.assign({},n,{metin:duzenlemeMetin.trim(),duzenlendi:simdiStr(),duzenlemeRol:rol}):n;
    });});
    setDuzenlemeId(null);setDuzenlemeMetin("");
  }

  function binaAdi(id){var b=elevs.find(function(e){return e.id===id;});return b?b.ad:"Bilinmiyor";}
  function binaIlce(id){var b=elevs.find(function(e){return e.id===id;});return b?(b.ilce||""):"";  }

  return React.createElement('div', null,

    /* ─── Başlık ─── */
    React.createElement('div', {style:{fontSize:20,fontWeight:800,marginBottom:16,letterSpacing:-0.5}}, "📝 Notlar"),

    /* ══════════════════════════════════
       YENİ NOT EKLE ALANI
    ══════════════════════════════════ */
    React.createElement('div', {style:{background:"var(--bg-panel)",borderRadius:16,overflow:"hidden",marginBottom:20,boxShadow:"var(--shadow-sm)"}},

      /* Başlık şeridi */
      React.createElement('div', {style:{padding:"12px 16px",borderBottom:"0.5px solid var(--border-soft)",display:"flex",alignItems:"center",gap:8}},
        React.createElement('div', {style:{width:28,height:28,borderRadius:8,background:"var(--accent)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14}}, "✏️"),
        React.createElement('div', {style:{fontWeight:700,fontSize:15,color:"var(--text)"}}, "Yeni Not Ekle")
      ),

      React.createElement('div', {style:{padding:"14px 16px",display:"flex",flexDirection:"column",gap:10}},

        /* İlçe seç */
        React.createElement('div', null,
          React.createElement('label', {style:{display:"block",fontSize:12,fontWeight:600,color:"var(--text-muted)",marginBottom:5}}, "1. İlçe Seçin"),
          React.createElement('select', {
            value:yeniIlce,
            onChange:function(e){setYeniIlce(e.target.value);setYeniBina("");},
            style:S.sel
          },
            React.createElement('option',{value:""},"— İlçe seçin —"),
            ilceler.map(function(il){return React.createElement('option',{key:il,value:il},il);})
          )
        ),

        /* Bina seç (ilçe seçilince açılır) */
        yeniIlce&&React.createElement('div', null,
          React.createElement('label', {style:{display:"block",fontSize:12,fontWeight:600,color:"var(--text-muted)",marginBottom:5}}, "2. Bina Seçin"),
          yeniBinaListesi.length===0
            ? React.createElement('div',{style:{fontSize:13,color:"var(--text-dim)",padding:"10px 0"}}, "Bu ilçede kayıtlı bina yok.")
            : React.createElement('select', {
                value:yeniBina,
                onChange:function(e){setYeniBina(e.target.value);},
                style:S.sel
              },
                React.createElement('option',{value:""},"— Bina seçin —"),
                yeniBinaListesi.map(function(e){return React.createElement('option',{key:e.id,value:String(e.id)},e.ad);})
              )
        ),

        /* Not metin alanı (bina seçilince açılır) */
        yeniBina&&React.createElement('div', null,
          React.createElement('label', {style:{display:"block",fontSize:12,fontWeight:600,color:"var(--text-muted)",marginBottom:5}},
            "3. Not — ",
            React.createElement('span',{style:{color:"var(--accent)",fontWeight:700}}, seciliBinaObj?seciliBinaObj.ad:"")
          ),
          React.createElement('textarea', {
            value:yeniNot,
            onChange:function(e){setYeniNot(e.target.value);},
            placeholder:"Notunuzu buraya yazın...",
            rows:4,
            autoFocus:true,
            style:Object.assign({},S.inp,{resize:"vertical",lineHeight:1.6,fontFamily:"inherit"})
          })
        ),

        /* Kaydet butonu */
        React.createElement('button', {
          onClick:notEkle,
          disabled:!yeniNot.trim()||!yeniBina,
          style:{
            padding:"13px",
            background:(yeniNot.trim()&&yeniBina)?"var(--accent)":"var(--bg-elevated)",
            border:"none",borderRadius:12,
            color:(yeniNot.trim()&&yeniBina)?"#fff":"var(--text-dim)",
            fontWeight:700,fontSize:15,
            cursor:(yeniNot.trim()&&yeniBina)?"pointer":"default",
            minHeight:50,transition:"all 0.2s"
          }
        }, "💾 Notu Kaydet")
      )
    ),

    /* ══════════════════════════════════
       KAYITLI NOTLAR
    ══════════════════════════════════ */
    React.createElement('div', null,

      /* Başlık + bina filtresi */
      React.createElement('div', {style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,flexWrap:"wrap",gap:8}},
        React.createElement('div', {style:{fontWeight:700,fontSize:15,color:"var(--text)"}},
          "🗂 Kayıtlı Notlar",
          React.createElement('span',{style:{marginLeft:8,fontSize:12,fontWeight:500,color:"var(--text-muted)"}}, "("+gorunenNotlar.length+")")
        ),
        notluBinalar.length>0&&React.createElement('select', {
          value:filtreBina,
          onChange:function(e){setFiltreBina(e.target.value);},
          style:Object.assign({},S.sel,{width:"auto",fontSize:12,padding:"7px 30px 7px 10px"})
        },
          React.createElement('option',{value:"tumu"},"Tüm binalar"),
          notluBinalar.map(function(e){
            var c=notlar.filter(function(n){return n.asansorId===e.id;}).length;
            return React.createElement('option',{key:e.id,value:String(e.id)},e.ad+" ("+c+")");
          })
        )
      ),

      /* Not listesi */
      gorunenNotlar.length===0
        ? React.createElement('div', {style:{
            textAlign:"center",color:"var(--text-dim)",fontSize:14,
            padding:"40px 20px",background:"var(--bg-panel)",
            borderRadius:16,boxShadow:"var(--shadow-sm)"
          }},
            React.createElement('div',{style:{fontSize:36,marginBottom:10}},"📭"),
            "Henüz kayıtlı not yok.",
            React.createElement('br',null),
            React.createElement('span',{style:{fontSize:13}}, "Yukarıdaki alandan ilk notu ekleyebilirsiniz.")
          )
        : React.createElement('div', {style:{display:"flex",flexDirection:"column",gap:10}},
            gorunenNotlar.map(function(n){
              var isYon=n.rol==="yonetici";
              var renkAcc=isYon?"var(--accent)":"var(--ios-green)";
              var rolLabel=isYon?"👔 Yönetici":"🔧 Bakımcı";
              var bAdi=binaAdi(n.asansorId);
              var bIlce=binaIlce(n.asansorId);
              return React.createElement('div', {key:n.id,
                style:{background:"var(--bg-panel)",borderRadius:14,padding:"14px 16px",
                  boxShadow:"var(--shadow-sm)",borderLeft:"3px solid "+renkAcc}
              },
                /* Üst: kim, bina, zaman */
                React.createElement('div', {style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10,gap:8,flexWrap:"wrap"}},
                  React.createElement('div', {style:{display:"flex",flexDirection:"column",gap:5}},
                    React.createElement('div',{style:{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}},
                      React.createElement('span',{style:{fontSize:12,fontWeight:700,color:renkAcc,background:renkAcc+"18",padding:"3px 10px",borderRadius:20}}, rolLabel),
                      React.createElement('span',{style:{fontSize:12,fontWeight:700,color:"var(--text)"}}, bAdi),
                      bIlce&&React.createElement('span',{style:{fontSize:11,color:"var(--text-muted)",background:"var(--bg-elevated)",padding:"2px 8px",borderRadius:20}}, bIlce)
                    )
                  ),
                  React.createElement('div',{style:{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:3,flexShrink:0}},
                    /* Oluşturulma */
                    React.createElement('div',{style:{display:"flex",alignItems:"center",gap:4}},
                      React.createElement('span',{style:{fontSize:10,color:"var(--text-dim)"}}, "Yazan:"),
                      React.createElement('span',{style:{fontSize:10,fontWeight:700,color:renkAcc}}, isYon?"👔 Yönetici":"🔧 Bakımcı"),
                      React.createElement('span',{style:{fontSize:10,color:"var(--text-muted)"}}, n.tarihSaat)
                    ),
                    /* Son düzenleme — varsa */
                    n.duzenlendi&&(function(){
                      var dRol=n.duzenlemeRol;
                      var dIsYon=dRol==="yonetici";
                      var dRenk=dIsYon?"var(--accent)":"var(--ios-green)";
                      return React.createElement('div',{style:{display:"flex",alignItems:"center",gap:4}},
                        React.createElement('span',{style:{fontSize:10,color:"var(--text-dim)"}}, "Düzenleyen:"),
                        React.createElement('span',{style:{fontSize:10,fontWeight:700,color:dRenk}}, dIsYon?"👔 Yönetici":"🔧 Bakımcı"),
                        React.createElement('span',{style:{fontSize:10,color:"var(--text-muted)"}}, n.duzenlendi)
                      );
                    })()
                  )
                ),
                /* Not metni ya da düzenleme */
                duzenlemeId===n.id
                  ? React.createElement('div',null,
                      React.createElement('textarea',{
                        value:duzenlemeMetin,
                        onChange:function(e){setDuzenlemeMetin(e.target.value);},
                        rows:3,autoFocus:true,
                        style:Object.assign({},S.inp,{resize:"vertical",lineHeight:1.5,marginBottom:8,fontFamily:"inherit"})
                      }),
                      React.createElement('div',{style:{display:"flex",gap:8,justifyContent:"flex-end"}},
                        React.createElement('button',{onClick:function(){setDuzenlemeId(null);},
                          style:{padding:"8px 16px",background:"var(--bg-elevated)",border:"none",borderRadius:10,color:"var(--text-muted)",cursor:"pointer",fontWeight:600,fontSize:13}
                        },"İptal"),
                        React.createElement('button',{onClick:duzenlemeSaydet,
                          style:{padding:"8px 16px",background:"var(--accent)",border:"none",borderRadius:10,color:"#fff",cursor:"pointer",fontWeight:700,fontSize:13}
                        },"💾 Kaydet")
                      )
                    )
                  : React.createElement('div',null,
                      React.createElement('div',{style:{fontSize:14,color:"var(--text)",lineHeight:1.6,whiteSpace:"pre-wrap",marginBottom:10}}, n.metin),
                      React.createElement('div',{style:{display:"flex",gap:8,justifyContent:"flex-end"}},
                        React.createElement('button',{onClick:function(){duzenlemeBaslat(n);},
                          style:{padding:"7px 14px",background:"var(--bg-elevated)",border:"none",borderRadius:10,color:"var(--accent)",cursor:"pointer",fontWeight:600,fontSize:12,minHeight:36}
                        },"✏️ Düzenle"),
                        React.createElement('button',{onClick:function(){notSil(n.id);},
                          style:{padding:"7px 14px",background:"rgba(255,59,48,0.1)",border:"none",borderRadius:10,color:"var(--ios-red)",cursor:"pointer",fontWeight:600,fontSize:12,minHeight:36}
                        },"🗑 Sil")
                      )
                    )
              );
            })
          )
    )
  );
}

  // Uygulama anında açılır, Supabase verisi arka planda yüklenir
  useEffect(function(){
    async function yukle(){
      try{
        // Tüm Firebase okumalarını paralel yap — ilkYukleme bayrağı kapanana kadar

        var sonuclar=await Promise.all([

        var r1=sonuclar[0],r2=sonuclar[1],r3=sonuclar[2],r4=sonuclar[3];

        // ── Asansör listesi ──────────────────────────────────────
        // Firebase erişilemezse veya boş dönerse localStorage yedeğine bak,

        (function(){

        else{var b=lsGet("ls_maints");if(b)setMaints(b);}

        if(r4){try{var d=fb(r4);if(Array.isArray(d))setTasks(d);}catch(e){}}
        if(r5){try{var d=fb(r5);if(Array.isArray(d))setSozlesmeler(d);}catch(e){}}
        if(r6){try{var d=fb(r6);if(Array.isArray(d))setHesapKayitlari(d);}catch(e){}}
        if(r7){try{var d=fb(r7);if(Array.isArray(d))setHaftalikKapamalar(d);}catch(e){}}
        if(r8){try{var d=fb(r8);if(Array.isArray(d)){setAylikKapamalar(d);lsSet("ls_aylik",d);}}catch(e){}}
        else{var b=lsGet("ls_aylik");if(b)setAylikKapamalar(b);}

  useEffect(function(){if(!ilkYukleme.current){dbSet("at_maints",maints);if(maints.length>0)lsSet("ls_maints",maints);}},[maints]);

  // Yükleme ekranı

  // ═══════════════════════════════════════════════════════════
  // OTOMATİK HAFTALIK & AYLIK KAPAMA
  // ═══════════════════════════════════════════════════════════
  useEffect(function(){
    if(ilkYukleme.current) return; // veriler yüklenmeden tetiklenme

    function yapHaftalikKapama(){
      if(kapamaTetiklendi.current.haftalik) return;
      kapamaTetiklendi.current.haftalik=true;
      var simdi=new Date();
      var hafta=getISOWeek(simdi);
      var yil=simdi.getFullYear();
      var kapamaKey="H"+yil+"-W"+hafta;
      setHaftalikKapamalar(function(prev){
        var zatenVar=prev.find(function(k){return k.kapamaKey===kapamaKey;});
        if(zatenVar) return prev;
        var baslangic=new Date(simdi);
        baslangic.setDate(simdi.getDate()-6);
        var basStr=baslangic.toLocaleDateString("tr-TR");
        var bitStr=simdi.toLocaleDateString("tr-TR");
        var snap={
          id:Date.now(),
          kapamaKey:kapamaKey,
          tip:"haftalik",
          baslarken:basStr,
          biterken:bitStr,
          kapamaZamani:simdi.toLocaleString("tr-TR"),
          odemeler:sonOdemeler.slice(),
          toplam:sonOdemeler.reduce(function(s,o){return s+(o.alinanTutar||0);},0),
          odemeAdedi:sonOdemeler.length
        };
        var yeni=[snap,...prev];
        if(yeni.length>5) yeni=yeni.slice(0,5);
        return yeni;
      });
    }

    function yapAylikKapama(){
      if(kapamaTetiklendi.current.aylik) return;
      kapamaTetiklendi.current.aylik=true;
      var simdi=new Date();
      // Önceki ayı kapat (1. günde çalışıyor, önceki ay kapanmalı)
      var ay=simdi.getMonth()===0?11:simdi.getMonth()-1;
      var yil=simdi.getMonth()===0?simdi.getFullYear()-1:simdi.getFullYear();
      var kapamaKey="A"+yil+"-M"+(ay+1);
      // Çift çalışma koruması: localStorage (Firebase gecikmesine karşı) + ref (stale closure'a karşı)
      var lsKey="kapama_"+kapamaKey;
      var zatenKapandi=localStorage.getItem(lsKey)||aylikKapamaRef.current.find(function(k){return k.kapamaKey===kapamaKey;});
      setAylikKapamalar(function(prev){
        var zatenVar=prev.find(function(k){return k.kapamaKey===kapamaKey;});
        if(zatenVar) return prev;
        var snap={
          id:Date.now(),
          kapamaKey:kapamaKey,
          tip:"aylik",
          ay:MONTHS[ay],
          yil:yil,
          kapamaZamani:simdi.toLocaleString("tr-TR"),
          odemeler:sonOdemeler.slice(),
          toplam:sonOdemeler.reduce(function(s,o){return s+(o.alinanTutar||0);},0),
          odemeAdedi:sonOdemeler.length
        };
        var yeni=[snap,...prev];
        if(yeni.length>2) yeni=yeni.slice(0,2);
        return yeni;
      });
      // Devir hesabı zaten yapıldıysa tekrar yapma
      if(zatenKapandi) return;
      // localStorage'a hemen kaydet — Firebase yazılmadan sayfa yenilenirse tekrar çalışmasın
      try{localStorage.setItem(lsKey,"1");}catch(e){}
      /* Ay kapanışında: her asansör için yeniDevir → bakiyeDevir olarak geçir */
      var ayBaslangic=new Date(yil,ay,1);ayBaslangic.setHours(0,0,0,0);
      var aySon=new Date(yil,ay+1,0);aySon.setHours(23,59,59,999);
      setElevs(function(prevElevs){
        return prevElevs.map(function(ev){
          var eskiDevir=ev.bakiyeDevir||0;
          var aylikUcret=ev.aylikUcret||0;
          // Bu ay bakım yapıldı mı?
          var bakimYapildi=maints.find(function(m){
            var d=new Date(m.tarih);
            return Number(m.asansorId)===Number(ev.id)&&m.yapildi&&d>=ayBaslangic&&d<=aySon;
          });
          if(!bakimYapildi) return ev; // bakım yapılmadıysa devir değişmez
          var yeniDevirHesap;
          if(ev.yeniDevirManuel!==undefined&&ev.yeniDevirManuel!==null&&ev.yeniDevirManuel!==""){
            yeniDevirHesap=Number(ev.yeniDevirManuel);
          } else {
            var toplamAlinan=sonOdemeler.filter(function(o){
              var od=new Date(o.tarih);
              return Number(o.aid)===Number(ev.id)&&!o.iptal&&od>=ayBaslangic&&od<=aySon;
            }).reduce(function(s,o){return s+(o.alinanTutar||0);},0);
            yeniDevirHesap=eskiDevir+aylikUcret-toplamAlinan;
          }
          // yeniDevirManuel sıfırla — bir sonraki ay otomatik hesaba döner
          return Object.assign({},ev,{bakiyeDevir:yeniDevirHesap,yeniDevirManuel:null});
        });
      });
    }

    function getISOWeek(d){
      var date=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
      var dayNum=date.getUTCDay()||7;
      date.setUTCDate(date.getUTCDate()+4-dayNum);
      var yearStart=new Date(Date.UTC(date.getUTCFullYear(),0,1));
      return Math.ceil((((date-yearStart)/86400000)+1)/7);
    }

    function kontrolEt(){
      var simdi=new Date();
      var gun=simdi.getDay(); // 0=Pazar, 6=Cumartesi
      var saat=simdi.getHours();
      var dakika=simdi.getMinutes();
      var ayinSonGunu=new Date(simdi.getFullYear(),simdi.getMonth()+1,0).getDate();

      // Haftalık: Cumartesi (6) saat 16:00+
      if(gun===6&&saat>=16){
        yapHaftalikKapama();
      } else {
        kapamaTetiklendi.current.haftalik=false;
      }

      // Aylık: Yeni aya geçildiğinde (1. gün 00:00 UTC+3) önceki ayı kapat
      // Önceki ayın kapanıp kapanmadığını kontrol et
      var oncekiAy=simdi.getMonth()===0?11:simdi.getMonth()-1;
      var oncekiYil=simdi.getMonth()===0?simdi.getFullYear()-1:simdi.getFullYear();
      var oncekiKey="A"+oncekiYil+"-M"+(oncekiAy+1);
      var oncekiKapandi=localStorage.getItem("kapama_"+oncekiKey)||aylikKapamaRef.current.find(function(k){return k.kapamaKey===oncekiKey;});
      if(!oncekiKapandi){
        // Önceki ay henüz kapanmadı → kapat (yeni ay başladıysa veya app geç açıldıysa)
        yapAylikKapama();
      } else {
        kapamaTetiklendi.current.aylik=false;
      }
      // fMonth'u otomatik güncelle — manuel seçim gerekmez
      setFMonth(function(prev){return prev!==simdi.getMonth()?simdi.getMonth():prev;});
    }

    kontrolEt();
    var timer=setInterval(kontrolEt,60000); // Her dakika kontrol et
    return function(){clearInterval(timer);};
  },[sonOdemeler,maints,elevs]);

  // ═══════════════════════════════════════════════════════════
  // GİDER OTOMATİK HAFTALIK SIFIRLAMA & GÜNLÜK KAYIT
  // ═══════════════════════════════════════════════════════════
  useEffect(function(){
    if(ilkYukleme.current) return;

    function getISOWeekG(d){
      var date=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));

      date.setUTCDate(date.getUTCDate()+4-dayNum);
      var yearStart=new Date(Date.UTC(date.getUTCFullYear(),0,1));
      return Math.ceil((((date-yearStart)/86400000)+1)/7);
    }

    // Günlük otomatik kayıt: her gün gece 23:50'de o günkü giderleri arşivle
    function gunlukKayitVeEmail(){
      var simdi=new Date();

        var govde="Tarih: "+bugun+"\nToplam Gider: "+toplamTutar.toLocaleString("tr-TR")+" ₺\nKayıt Sayısı: "+bugunGiderler.length+"\n\nDetay:\n"+satirlar.join("\n")+"\n\n-- AsansörTakip Pro --";
        var mailtoUrl="mailto:iletisimasis@gmail.com?subject="+encodeURIComponent(konu)+"&body="+encodeURIComponent(govde);
        // Sadece bir kere aç (daha önce açılmadıysa)

        if(!sessionStorage.getItem(gunKey)){
          sessionStorage.setItem(gunKey,"1");
          window.open(mailtoUrl,"_blank");
        }
      }
    }

    // Haftalık sıfırlama: Cumartesi 16:00'da giderleri arşivle ve sıfırla
    function haftalikGiderSifirla(){
      var simdi=new Date();
      var gun=simdi.getDay(); // 6=Cumartesi
      var saat=simdi.getHours();

        setGiderHaftaArsiv(function(prev){
          if(prev.find(function(k){return k.kapamaKey===kapamaKey;})) return prev;
          if(giderler.length===0) return prev;
          var buHaftaStart=new Date(simdi);
          buHaftaStart.setDate(simdi.getDate()-6);
          var snap={
            id:Date.now(),
            kapamaKey:kapamaKey,
            baslarken:buHaftaStart.toLocaleDateString("tr-TR"),
            biterken:simdi.toLocaleDateString("tr-TR"),
            kapamaZamani:simdi.toLocaleString("tr-TR"),
            giderler:giderler.slice(),
            toplam:giderler.reduce(function(s,g){return s+(g.tutar||0);},0),
            kayitAdedi:giderler.length
          };
          var yeni=[snap,...prev];
          if(yeni.length>5) yeni=yeni.slice(0,5);
          return yeni;
        });
        giderKapamaTetiklendi.current=true;
        // Giderleri sıfırla
        setGiderler([]);
        // Haftalık gider email gönder
        var toplamTutar=giderler.reduce(function(s,g){return s+(g.tutar||0);},0);
        var simdiStr=simdi.toLocaleDateString("tr-TR");
        var buHaftaStart2=new Date(simdi);buHaftaStart2.setDate(simdi.getDate()-6);
        var konu="Asansör Takip - Haftalık Gider Özeti "+buHaftaStart2.toLocaleDateString("tr-TR")+" - "+simdiStr;
        var satirlar2=(giderler||[]).map(function(g){return g.tarih+"  |  "+g.aciklama+"  |  "+(g.tutar||0).toLocaleString("tr-TR")+" ₺";});
        var govde2="Hafta: "+buHaftaStart2.toLocaleDateString("tr-TR")+" – "+simdiStr+"\nToplam Gider: "+toplamTutar.toLocaleString("tr-TR")+" ₺\nKayıt Sayısı: "+(giderler||[]).length+"\n\nTüm Giderler:\n"+satirlar2.join("\n")+"\n\n-- AsansörTakip Pro (Otomatik Haftalık Rapor) --";
        var mailtoUrl2="mailto:iletisimasis@gmail.com?subject="+encodeURIComponent(konu)+"&body="+encodeURIComponent(govde2);
        var haftaKey="gemail_GH"+yil+"-W"+hafta;

    },60000);
    return function(){clearInterval(giderTimer);};
  },[giderler]);

  const konumAl=async(sessiz)=>{
    setKonumYukleniyor(true);setKonumHata("");
    // Önce tarayıcı GPS'i dene
    if(navigator.geolocation){
      try{
        const pos=await new Promise((res,rej)=>navigator.geolocation.getCurrentPosition(res,rej,{timeout:6000,maximumAge:60000}));
        setRotaKonum({lat:pos.coords.latitude,lng:pos.coords.longitude,label:"📍 GPS Konumunuz"});
        setRotaStart("");

        document.getElementById('root').innerHTML='<div style="padding:40px;color:#e0e6f0;font-family:monospace"><div style="color:#ef4444;font-weight:700;font-size:16px">'+e.message+'</div><pre style="background:#111;padding:12px;border-radius:8px;font-size:11px;color:#f59e0b;overflow:auto">'+String(e.stack||e)+'</pre><button onclick="location.reload()" style="margin-top:12px;padding:8px 20px;background:#3b82f6;border:none;border-radius:8px;color:#fff;cursor:pointer">Yenile</button></div>'
      }
      });
    });
  });
  </script>
